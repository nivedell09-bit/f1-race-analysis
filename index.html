<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏎️ F1 Live Race Simulation</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-content">
                <h1>🏎️ F1 Live Race Simulation</h1>
                <div class="race-status">
                    <span class="status-dot"></span>
                    <span id="raceStatus">LIVE</span>
                    <span id="lapCounter">Lap 1/57</span>
                </div>
            </div>
        </header>

        <!-- Main Race View -->
        <div class="race-view">
            <!-- Track Container -->
            <div class="track-container">
                <div class="track">
                    <canvas id="trackCanvas"></canvas>
                    
                    <!-- Car positions overlay -->
                    <div id="carsContainer">
                        <!-- Cars will be rendered here by JavaScript -->
                    </div>
                    
                    <!-- Track Labels -->
                    <div class="track-labels">
                        <span class="start-finish">🏁 START/FINISH</span>
                        <span class="turn-label">T1</span>
                        <span class="turn-label">T2</span>
                        <span class="turn-label">T3</span>
                        <span class="turn-label">T4</span>
                    </div>
                </div>
            </div>

            <!-- Timing Tower -->
            <div class="timing-tower">
                <h3>⏱️ LIVE TIMING</h3>
                <div class="timing-grid" id="timingGrid">
                    <!-- Driver timing rows will be inserted here -->
                </div>
            </div>
        </div>

        <!-- Stats & Controls -->
        <div class="controls-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Race Progress</span>
                    <span class="stat-value" id="raceProgress">0%</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Current Leader</span>
                    <span class="stat-value" id="currentLeader">VER</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Fastest Lap</span>
                    <span class="stat-value" id="fastestLap">1:32.608</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Safety Car</span>
                    <span class="stat-value" id="safetyCar">🚦 OFF</span>
                </div>
            </div>

            <div class="controls">
                <button id="startRace" class="btn btn-primary">▶️ START RACE</button>
                <button id="pauseRace" class="btn btn-warning">⏸️ PAUSE</button>
                <button id="resetRace" class="btn btn-danger">🔄 RESET</button>
                <button id="toggleView" class="btn btn-secondary">📊 VIEW</button>
            </div>
        </div>

        <!-- Bottom Stats -->
        <div class="bottom-stats">
            <div class="chart-container">
                <canvas id="speedChart"></canvas>
            </div>
            <div class="legend">
                <div class="legend-item">
                    <span class="color-box" style="background: #e10600;"></span>
                    <span>Red Bull</span>
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background: #00d2be;"></span>
                    <span>Mercedes</span>
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background: #dc0000;"></span>
                    <span>Ferrari</span>
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background: #1e5bc6;"></span>
                    <span>McLaren</span>
                </div>
                <div class="legend-item">
                    <span class="color-box" style="background: #469b46;"></span>
                    <span>Aston Martin</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
